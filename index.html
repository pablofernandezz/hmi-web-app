<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Informe de gastos compartidos del grupo Bon Jovi">
    <title>SplitWithMe - Informe de Gastos</title>
    <link rel="stylesheet" href="css/styles.css">
</head>
<body>

    <header class="site-header">
        <div class="container">
            <h1>SplitWithMe 💸</h1>
            </div>
    </header>

    <main class="container dashboard-grid">
        
        <div class="master-column">
            
            <section class="summary">
                <h2 class="visually-hidden">Resumen de Cuentas</h2>
                <div class="summary-card total">
                    <p>Gasto Total</p>
                    <p class="amount" id="dashboard-total">1.250,00 €</p>
                </div>
                <div class="summary-card balance negative">
                    <p>Te deben</p>
                    <p class="amount" id="dashboard-balance">10,56 €</p>
                </div>
            </section>

            <section class="expenses-list">
            <h2>Historial de Gastos</h2>
            
            <div id="expenses-list">
                <p>Cargando gastos...</p>
            </div>
        </section>
        </div>

        <section class="expense-detail-panel desktop-only">
            <div class="detail-container">
                <header class="detail-header">
                    <div class="expense-icon-large" aria-hidden="true">📝</div>
                    <div>
                        <h2 id="detail-title">Selecciona un gasto</h2>
                        <p class="text-muted">
                            <span id="detail-subtitle">--</span> | 
                            <time id="detail-date">--/--/----</time>
                        </p>
                    </div>
                </header>

                <div class="detail-body">
                    <div class="financial-summary">
                        <div class="fin-item">
                            <span class="label">Importe Total</span>
                            <span class="value large" id="detail-total">0,00 €</span>
                        </div>
                        </div>

                    <div class="participants-section">
                        <h3>Reparto del gasto</h3>
                        <ul class="participants-list" id="detail-participants">
                            </ul>
                    </div>
                    </div>
            </div>
        </section>
    </main>

    <button id="btn-add-expense" class="fab-btn" aria-label="Añadir gasto">
    ➕
    </button>

    <footer class="site-footer">
        <p>&copy; 2025 Grupo Bon Jovi - IPM</p>
    </footer>
    <script src="js/main.js"></script>
</body>
</html>
